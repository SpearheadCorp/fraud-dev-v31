# Custom DCGM metrics: 1-second collection interval + profiling metrics
# Shows actual GPU utilization spikes instead of 30s averages.
# Apply: kubectl apply -f k8s/dcgm-custom-metrics.yaml
# Then patch the ClusterPolicy to use this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-custom-metrics
  namespace: gpu-operator
data:
  dcgm-metrics.csv: |
    # Standard utilization metrics
    DCGM_FI_DEV_GPU_UTIL,       gauge, GPU utilization (%).
    DCGM_FI_DEV_MEM_COPY_UTIL,  gauge, Memory utilization (%).
    DCGM_FI_DEV_FB_FREE,        gauge, Framebuffer memory free (MiB).
    DCGM_FI_DEV_FB_USED,        gauge, Framebuffer memory used (MiB).
    DCGM_FI_DEV_GPU_TEMP,       gauge, GPU temperature (C).
    DCGM_FI_DEV_POWER_USAGE,    gauge, Power draw (W).
    DCGM_FI_DEV_SM_CLOCK,       gauge, SM clock frequency (MHz).
    DCGM_FI_DEV_MEM_CLOCK,      gauge, Memory clock frequency (MHz).
    # Profiling metrics — actual engine activity (not averaged)
    DCGM_FI_PROF_GR_ENGINE_ACTIVE,   gauge, Graphics engine active ratio.
    DCGM_FI_PROF_SM_ACTIVE,          gauge, Streaming multiprocessor active ratio.
    DCGM_FI_PROF_SM_OCCUPANCY,       gauge, SM occupancy ratio.
    DCGM_FI_PROF_DRAM_ACTIVE,        gauge, DRAM active ratio.
    DCGM_FI_PROF_PCIE_TX_BYTES,      gauge, PCIe TX bytes per second.
    DCGM_FI_PROF_PCIE_RX_BYTES,      gauge, PCIe RX bytes per second.
