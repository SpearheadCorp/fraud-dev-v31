---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: fraud-det-v31

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fraud-det-v31-backend
rules:
  # Jobs — create/delete/monitor pipeline Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "watch", "patch", "update"]
  # Pods — read logs for telemetry
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Deployments — scale inference up/down
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fraud-det-v31-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fraud-det-v31-backend
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: fraud-det-v31
